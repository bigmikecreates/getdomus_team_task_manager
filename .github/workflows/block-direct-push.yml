name: Block Direct Pushes to Main

on:
  push:
    branches: [main]

jobs:
  check-pr-origin:
    runs-on: ubuntu-latest
    steps:
      - name: Verify commits come from a PR
        run: |
          echo "Checking commits on branch: ${{ github.ref }}"
          echo "Head commit message: ${{ github.event.head_commit.message }}"

          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if echo "$COMMIT_MSG" | grep -qiE "(Merge pull request|Merge #|^[a-f0-9]+ \(#\d+\))"; then
            echo "✅ Commit appears to originate from a merged PR."
            exit 0
          fi

          echo "❌ Direct push to main detected. All changes must go through a PR."
          echo "   Use: git checkout -b feature/<name> && git push -u origin feature/<name>"
          echo "   Then open a PR on GitHub."
          exit 1
